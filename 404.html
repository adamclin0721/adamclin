<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>找不到頁面 · Adam</title>
<style>
  :root{--bg:#E5E5DE;--ink:#1B2A30;--ink-soft:#4B5C63;--line:rgba(27,42,48,.3);--teal:#2E5159;--brass:#A67C26}
  @media (prefers-color-scheme:dark){:root{--bg:#161D20;--ink:#E8E7DF;--ink-soft:#AEB8BC;--line:rgba(232,231,223,.3);--teal:#86B2BA;--brass:#CBA346}}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:'Spectral',Georgia,serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .n{font-family:ui-monospace,monospace;font-size:.78rem;letter-spacing:.3em;color:var(--brass);text-transform:uppercase}
  h1{font-size:clamp(3rem,12vw,5rem);font-weight:700;letter-spacing:-.02em;margin:.18em 0}
  p{color:var(--ink-soft);font-size:1.08rem;margin-bottom:1.5em}
  hr{border:none;border-top:1px solid var(--line);width:60px;margin:1.3em auto}
  a{color:var(--teal);font-family:ui-monospace,monospace;font-size:.9rem;text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:2px}
  a:hover{color:var(--brass)}
</style>
</head>
<body>
  <div>
    <div class="n">Error 404</div>
    <h1>找不到頁面</h1>
    <hr>
    <p>這個網址不存在，或頁面已被移動。</p>
    <a href="/adamclin/">← 回首頁</a>
  </div>
</body>
</html>
